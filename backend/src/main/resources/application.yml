spring:
  application:
    name: anon-news-backend

  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://localhost:5432/anonnews
    username: anonnews
    password: anonnews
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_batch_fetch_size: 25
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# ---------- Management / Actuator ----------
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      otlp:
        enabled: true
        url: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/metrics
        step: 30s
    tags:
      application: ${spring.application.name}

# ---------- Server ----------
server:
  port: 8080
  shutdown: graceful

# ---------- Poller Configuration ----------
poller:
  enabled: true
  sources:
    reddit:
      enabled: true
      cron: "0 */5 * * * *"
      subreddits:
        - kubernetes
        - devops
        - selfhosted
        - homelab
        - cloudnative
      limit: 25
      user-agent: "anon-news-bot/0.1 (by /u/anon-news-aggregator)"
    hackernews:
      enabled: true
      cron: "0 */3 * * * *"
      endpoints:
        top: https://hacker-news.firebaseio.com/v0/topstories.json
        new: https://hacker-news.firebaseio.com/v0/newstories.json
        best: https://hacker-news.firebaseio.com/v0/beststories.json
      limit: 30
    devto:
      enabled: true
      cron: "0 */10 * * * *"
      base-url: https://dev.to/api
      tags:
        - kubernetes
        - devops
        - cloud
        - docker
        - observability
      per-page: 25
    github-releases:
      enabled: true
      cron: "0 0 * * * *"
      repos:
        - kubernetes/kubernetes
        - prometheus/prometheus
        - grafana/grafana
        - open-telemetry/opentelemetry-collector
        - argoproj/argo-cd
        - helm/helm
        - istio/istio
        - cilium/cilium
        - crossplane/crossplane
        - fluxcd/flux2
    lobsters:
      enabled: true
      cron: "0 */10 * * * *"
      base-url: https://lobste.rs
      tags:
        - devops
        - kubernetes
        - networking
        - security
      limit: 25
    rss:
      enabled: true
      cron: "0 */15 * * * *"
      feeds:
        - name: KubeWeekly
          url: https://www.cncf.io/kubeweekly/feed/
          category: cncf
        - name: CNCF Blog
          url: https://www.cncf.io/blog/feed/
          category: cncf
        - name: Kubernetes Blog
          url: https://kubernetes.io/feed.xml
          category: kubernetes

# ---------- Dead Letter / Retry ----------
dead-letter:
  retry:
    enabled: true
    cron: "0 */30 * * * *"
    max-retries: 5
    backoff-multiplier: 2.0
    initial-delay-seconds: 60

# ---------- API Key Auth ----------
auth:
  api-key:
    enabled: true
    header-name: X-API-Key
    # Public endpoints that skip auth
    public-paths:
      - /actuator/health
      - /actuator/info
      - /api/v1/articles
      - /api/v1/articles/**
      - /api/v1/sources

# ---------- Resilience4j ----------
resilience4j:
  circuitbreaker:
    instances:
      reddit:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
        minimum-number-of-calls: 5
        record-exceptions:
          - java.io.IOException
          - java.net.SocketTimeoutException
          - org.springframework.web.client.ResourceAccessException
      hackernews:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
        minimum-number-of-calls: 5
      devto:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 120s
        permitted-number-of-calls-in-half-open-state: 3
        minimum-number-of-calls: 5
      github:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 300s
        permitted-number-of-calls-in-half-open-state: 2
        minimum-number-of-calls: 5
      lobsters:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
        minimum-number-of-calls: 5
      rss:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
        minimum-number-of-calls: 5

  retry:
    instances:
      reddit:
        max-attempts: 3
        wait-duration: 2s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - java.io.IOException
          - java.net.SocketTimeoutException
      hackernews:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
      devto:
        max-attempts: 3
        wait-duration: 2s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
      github:
        max-attempts: 2
        wait-duration: 5s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
      lobsters:
        max-attempts: 3
        wait-duration: 2s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
      rss:
        max-attempts: 3
        wait-duration: 2s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2

  ratelimiter:
    instances:
      reddit:
        limit-for-period: 10
        limit-refresh-period: 60s
        timeout-duration: 5s
      hackernews:
        limit-for-period: 30
        limit-refresh-period: 60s
        timeout-duration: 5s
      devto:
        limit-for-period: 20
        limit-refresh-period: 60s
        timeout-duration: 5s
      github:
        limit-for-period: 10
        limit-refresh-period: 60s
        timeout-duration: 5s
      lobsters:
        limit-for-period: 10
        limit-refresh-period: 60s
        timeout-duration: 5s
      rss:
        limit-for-period: 20
        limit-refresh-period: 60s
        timeout-duration: 5s
