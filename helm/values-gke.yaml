# GKE Standard overrides for The Self-Observing Observatory
# Usage: helm upgrade --install o11y-news ./helm -f helm/values-gke.yaml -n o11y-news
# Cost target: <$20/month on single e2-small (2 vCPU, 2GB RAM)

backend:
  replicas: 1
  image:
    repository: ghcr.io/npcomplete777/o11y-news-backend
    tag: e79b8cc
    pullPolicy: Always
  env:
    SPRING_PROFILES_ACTIVE: kubernetes
    SPRING_THREADS_VIRTUAL_ENABLED: "true"
    JAVA_TOOL_OPTIONS: "-XX:+UseZGC -XX:MaxRAMPercentage=75.0 -javaagent:/otel-agent/opentelemetry-javaagent.jar"
  resources:
    requests:
      cpu: 200m
      memory: 768Mi
    limits:
      cpu: 500m
      memory: 1536Mi
frontend:
  replicas: 1
  image:
    repository: ghcr.io/npcomplete777/o11y-news-frontend
    tag: 5b2b16b
    pullPolicy: Always
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
postgres:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 250m
      memory: 512Mi
  storage:
    size: 5Gi
    storageClass: standard-rwo
ingress:
  enabled: true
  className: nginx
  host: "34-172-174-213.sslip.io"
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  tls:
    enabled: true
localOtel:
  enabled: true
  javaAgentImage: "ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-java:2.11.0"
  otelcol:
    image: "otel/opentelemetry-collector-contrib:0.118.0"
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
  jaeger:
    image: "jaegertracing/all-in-one:1.64"
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 150m
        memory: 256Mi
  prometheus:
    image: "prom/prometheus:v3.1.0"
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 150m
        memory: 256Mi

dash0:
  enabled: true
  authToken: "" # injected via ArgoCD helm param (not in git)
  dataset: "o11y-news"
  dashboards:
    enabled: false # PersesDashboard CRD not available via Dash0 Operator
  alerts:
    enabled: false # PrometheusRule CRD requires Prometheus Operator (not installed)
  syntheticChecks:
    enabled: true
    frontendUrl: "https://34-172-174-213.sslip.io"
    backendHealthUrl: "https://34-172-174-213.sslip.io/api/health"
    telemetryApiUrl: "https://34-172-174-213.sslip.io/api/telemetry/metrics"
    locations:
      - "eu-west-1"
      - "us-east-1"
  views:
    enabled: true
