# GKE Standard overrides for The Self-Observing Observatory
# Usage: helm upgrade --install o11y-news ./helm -f helm/values-gke.yaml -n o11y-news
# Cost target: <$20/month on single e2-small (2 vCPU, 2GB RAM)

backend:
  replicas: 1
  image:
    repository: ghcr.io/npcomplete777/o11y-news-backend
    tag: "94932e7"
    pullPolicy: Always
  env:
    SPRING_PROFILES_ACTIVE: kubernetes
    SPRING_THREADS_VIRTUAL_ENABLED: "true"
    JAVA_TOOL_OPTIONS: "-XX:+UseZGC -XX:MaxRAMPercentage=75.0 -javaagent:/otel-agent/opentelemetry-javaagent.jar"
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1024Mi
frontend:
  replicas: 1
  image:
    repository: ghcr.io/npcomplete777/o11y-news-frontend
    tag: "984d718"
    pullPolicy: Always
  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
postgres:
  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 256Mi
  storage:
    size: 5Gi
    storageClass: standard-rwo
ingress:
  enabled: true
  className: nginx
  host: "o11y-alchemy.com"
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  tls:
    enabled: true
localOtel:
  enabled: true
  javaAgentImage: "ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-java:2.11.0"
  otelcol:
    image: "otel/opentelemetry-collector-contrib:0.118.0"
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 50m
        memory: 96Mi
  clickhouse:
    enabled: true
    image: "clickhouse/clickhouse-server:24.8-alpine"
    storage:
      size: 20Gi
      storageClassName: standard-rwo # GKE standard persistent disk (RWO)
    resources:
      requests:
        cpu: 150m
        memory: 512Mi
      limits:
        cpu: 750m
        memory: 1Gi
    auth:
      password: ""
  jaeger:
    enabled: false
  prometheus:
    enabled: false
dash0:
  enabled: false # free trial expired — all Dash0 exporters disabled (templates preserved)
  authToken: "" # injected via ArgoCD helm param (not in git)
  dataset: "o11y-news"
  dashboards:
    enabled: false
  alerts:
    enabled: false
  syntheticChecks:
    enabled: false
    frontendUrl: "https://o11y-alchemy.com"
    backendHealthUrl: "https://o11y-alchemy.com/api/health"
    telemetryApiUrl: "https://o11y-alchemy.com/api/telemetry/metrics"
    locations:
      - "eu-west-1"
      - "us-east-1"
  views:
    enabled: false
