backend:
  replicas: 1
  image:
    repository: o11y-news-backend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 250m
      memory: 768Mi
    limits:
      cpu: "2"
      memory: 1536Mi
  env:
    SPRING_PROFILES_ACTIVE: kubernetes
    SPRING_THREADS_VIRTUAL_ENABLED: "true"
    JAVA_TOOL_OPTIONS: "-XX:+UseZGC -XX:MaxRAMPercentage=75.0 -javaagent:/otel-agent/opentelemetry-javaagent.jar"

frontend:
  replicas: 1
  image:
    repository: o11y-news-frontend
    tag: latest
    pullPolicy: IfNotPresent
  adminPassword: ""   # Set via ArgoCD helm param --set frontend.adminPassword=... (never commit real value)
  service:
    type: ClusterIP
    port: 3000
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi

postgres:
  image:
    repository: postgres
    tag: "16-alpine"
  service:
    port: 5432
  storage:
    size: 10Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 1Gi
  auth:
    username: o11ynews
    password: o11ynews-secret-pw
    database: o11ynews

ingress:
  enabled: true
  className: traefik
  host: o11y-news.local
  annotations: {}
  tls:
    enabled: false

dash0:
  enabled: true
  authToken: ""   # Set via ArgoCD helm param or --set (never in git)
  dataset: "default"
  dashboards:
    enabled: true
  alerts:
    enabled: true
  syntheticChecks:
    enabled: true
    frontendUrl: "https://o11y-news.local"
    backendHealthUrl: "https://o11y-news.local/api/health"
    telemetryApiUrl: "https://o11y-news.local/api/telemetry/metrics"
    locations:
      - "eu-west-1"
  views:
    enabled: true

localOtel:
  enabled: true
  javaAgentImage: "ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-java:2.11.0"
  otelcol:
    image: "otel/opentelemetry-collector-contrib:0.118.0"
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
  clickhouse:
    enabled: true
    image: "clickhouse/clickhouse-server:24.8-alpine"
    storage:
      size: 20Gi
      storageClassName: standard
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 2Gi
    auth:
      password: ""  # no password for cluster-internal use; override per environment
  # Jaeger and Prometheus are disabled in favour of ClickHouse.
  # Set enabled: true to re-enable for local debugging.
  jaeger:
    enabled: false
    image: "jaegertracing/all-in-one:latest"
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
  prometheus:
    enabled: false
    image: "prom/prometheus:v3.1.0"
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

apiKeys:
  reddit:
    clientId: ""
    clientSecret: ""
  github:
    token: ""
  youtube:
    apiKey: ""
  devto:
    apiKey: ""
