{{- if and .Values.dash0.enabled .Values.dash0.views.enabled }}
apiVersion: operator.dash0.com/v1alpha1
kind: Dash0View
metadata:
  name: {{ .Release.Name }}-slow-requests
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
    app.kubernetes.io/component: view
spec:
  display:
    name: "Slow Requests"
    description: "View of requests with high latency for performance analysis"
  type: resources
{{- end }}
