{{- if and .Values.dash0.enabled .Values.dash0.alerts.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ .Release.Name }}-high-error-rate
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
    app.kubernetes.io/component: alerting
spec:
  groups:
    - name: {{ .Release.Name }}.error-rate
      interval: 1m
      rules:
        - alert: HighErrorRate
          expr: >
            100 * sum(rate(http_server_request_duration_seconds_count{namespace="{{ .Release.Namespace }}", http_response_status_code=~"5.."}[5m]))
            /
            sum(rate(http_server_request_duration_seconds_count{namespace="{{ .Release.Namespace }}"}[5m]))
            > 5
          for: 5m
          labels:
            severity: critical
            team: platform
            app: {{ .Release.Name }}
          annotations:
            summary: "High error rate on {{ .Release.Name }}"
            description: "5xx error rate is above 5% for the last 5 minutes. Current value: {{`{{ $value | printf \"%.1f\" }}`}}%"
{{- end }}
