apiVersion: v1
kind: Secret
metadata:
  name: {{ include "anon-news.fullname" . }}-api-keys
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "anon-news.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
type: Opaque
stringData:
  REDDIT_CLIENT_ID: {{ .Values.apiKeys.reddit.clientId | quote }}
  REDDIT_CLIENT_SECRET: {{ .Values.apiKeys.reddit.clientSecret | quote }}
  GITHUB_TOKEN: {{ .Values.apiKeys.github.token | quote }}
  YOUTUBE_API_KEY: {{ .Values.apiKeys.youtube.apiKey | quote }}
  DEVTO_API_KEY: {{ .Values.apiKeys.devto.apiKey | quote }}
