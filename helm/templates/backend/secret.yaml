apiVersion: v1
kind: Secret
metadata:
  name: {{ include "o11y-news.fullname" . }}-api-keys
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "o11y-news.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
type: Opaque
stringData:
  REDDIT_CLIENT_ID: {{ .Values.apiKeys.reddit.clientId | quote }}
  REDDIT_CLIENT_SECRET: {{ .Values.apiKeys.reddit.clientSecret | quote }}
  GITHUB_TOKEN: {{ .Values.apiKeys.github.token | quote }}
  YOUTUBE_API_KEY: {{ .Values.apiKeys.youtube.apiKey | quote }}
  DEVTO_API_KEY: {{ .Values.apiKeys.devto.apiKey | quote }}
  # Dash0 REST API credentials — used by the backend telemetry endpoints to query Dash0
  DASH0_API_TOKEN: {{ .Values.dash0.authToken | quote }}
  DASH0_DATASET: {{ .Values.dash0.dataset | default "default" | quote }}
