apiVersion: v1
kind: Service
metadata:
  name: {{ include "o11y-news.fullname" . }}-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "o11y-news.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "o11y-news.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
